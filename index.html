<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RCC Deposit Calculator</title>
<style>
body{
font-family:Arial,sans-serif;
max-width:700px;
margin:auto;
padding:20px;
}
input{
width:100%;
padding:10px;
margin:5px 0 15px;
}
button{
padding:10px 20px;
cursor:pointer;
}
.result{
margin-top:20px;
padding:15px;
border:1px solid #ccc;
}
</style>
</head>
<body>

<h1>Richter Corporate Counsel</h1>
<h2>30% Deposit Calculator</h2>

<label>Client Name</label>
<input type="text" id="client">

<label>Ticket Number</label>
<input type="text" id="ticket">

<label>Date</label>
<input type="date" id="date">

<label>Total Case Fee ($)</label>
<input type="number" id="amount">

<button onclick="calculate()">Calculate</button>

<div class="result" id="result"></div>

<script>
function calculate(){

let client =
document.getElementById("client").value;

let ticket =
document.getElementById("ticket").value;

let date =
document.getElementById("date").value;

let amount =
parseFloat(document.getElementById("amount").value);

if(isNaN(amount)){
alert("Enter a valid fee amount.");
return;
}

let firmShare = amount * 0.30;
let attorneyShare = amount * 0.70;

let depositReason =
client + " | " +
date + " | $" +
firmShare.toFixed(2) +
" | Ticket #" + ticket;

document.getElementById("result").innerHTML = `
<h3>Results</h3>

<b>RCC Share (30%)</b><br>
$${firmShare.toFixed(2)}<br><br>

<b>Attorney Share (70%)</b><br>
$${attorneyShare.toFixed(2)}<br><br>

<b>Deposit Reason</b><br>
${depositReason}
`;
}
</script>

</body>
</html>
